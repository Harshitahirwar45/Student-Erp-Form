<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP Sign Up</title>
</head> 

<body>
 <H1 style="text-align:center;">STUDENT ERP SIGN UP</H1>   

<h2 style = "text-align:center;">FILL THE DETAILS CAREFULLY</h2>
<BR>
<form action="submitpage.html">
<H3>ENTER YOUR FULL NAME</H3>
<input type = "text" name = "full_name" placeholder = "student full name" required>
<br>
<br>
<h3>ENTER YOUR FATHER'S NAME</h3>
<input type = "text" placeholder = "FATHER'S NAME" required>
<br>
<br>
<h3>ENTER YOUR MOTHER'S NAME</h3>
<input type = "text" placeholder = "MOTHER'S NAME" required>
<br>
<br>
<h3>ENTER YOUR ADDRESS</h3>
<input type = "text" placeholder="ADDRESS" required>
<br>
<br>
<H3>ENTER YOUR ROLL NUMBER</H3>
<input type="text" placeholder="Student Roll Number" required>
<br>
<br>
<H3>ENTER PASSWORD</H3>
<input type = "password" placeholder = "Enter password" required>
<br>
<br>
<H3>CONFIRM PASSWORD</H3>
<input type = "password" placeholder = "confirm password" required>
<br>

<br>
<H3>SELECT YOUR CITY</H3>
<BR>
<select name = "CITY" required>
<option value ="">--select city--</option>
<option value = "BHOPAL">BHOPAL</option>
<option value = "INDORE">INDORE</option>
<option value = "MUMBAI">MUMBAI</option>
<option value = "SAGAR">SAGAR</option>
<option value = "PANJI">PANJI</option>
</select>
<BR>
<BR>
<input type="submit" value="Sign Up">
</form>
</body>
</html>
